# OpenAI Codex adapter. This file supplies the interface metadata Codex shows in
# its agent picker. The skill's actual instructions live in ../SKILL.md, which the
# Agent Skills client installs alongside this file and loads when the skill runs.
interface:
  display_name: "Check"
  short_description: "Prove a change works, or review it, before merge"
  default_prompt: "Run the check skill: read its SKILL.md, then pick a mode. Use verify to drive the real app and prove the change works, or review for a fresh-model code review of the diff."
